######################################
##           ESP32-C3               ##
##  |21|       |#|      | 0| gate   ##
##  |20|       |#|      | 1| zero   ##
##  |10|       |#|      | 2| buton  ##
##  | 9|       |#|      | 3| start  ##
##  | 8|       |#|      | 4| adc    ##
##  | 7|       |#|      |3v|        ##
##  | 6| led   |#|      |GN|        ##
##  | 5| over  |#|      |5V|        ## 
######################################

######################################
##          PIC16F690               ##
##  | 1| 5V    |#|      |20| GND    ##
##  | 2|       |#|      |19|        ##
##  | 3|       |#|      |18|        ##
##  | 4|       |#|      |17| zero   ##
##  | 5| gate  |#|      |16| J3     ##
##  | 6| buton |#|      |15| LED    ##
##  | 7| start |#|      |14|        ##
##  | 8|       |#|      |13|        ## 
##  | 9|       |#|      |12|        ##
##  |10|       |#|      |11|        ## 
######################################

########  P1 ######## 
#  |1| VCC     
#  |2| ADC?  j3 коммаппаратор
#  |3| zero  
#  |4| gate pin 
#  |5| GND    

########  P2 ######## 
#  |1| TQ     
#  |2| TQ

substitutions:
  name: basement-vacum
  device_description: "BEAM SC 355 vacuum cleaner"
  room: Подвал

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TIMER_SUPPORTS_ISR_DISPATCH_METHOD: "y"  # callbacks immune to task preemption

logger:
  
external_components:
  - source: github://InspectorTrinket/advanced_ac_dimmer
    components: [advanced_ac_dimmer] 
    
#-------------------------------------------
# PACKAGES
#-------------------------------------------
packages:
  wifi: !include packages/wifi.yaml
  device_base: !include packages/device_base.yaml
  web: !include included/web.yaml
  time: !include included/time.yaml

wifi:
  power_save_mode: none   # eliminates bursty WiFi wakeup events
#-------------------------------------------
# OUTPUT
#-------------------------------------------      
output:
  - platform: advanced_ac_dimmer
    gate_pin: 0
    id: dimmer
    zero_cross_pin:
      number: 1
      mode:
        input: true
        pullup: false
      inverted: false
    method: leading_pulse               # Для симистора BTA16
    min_power: 0.15                     # 15% — минимальный стартовый уровень
    max_power: 1 #0.95                  # 95% — щадящий режим для двигателя
    zc_method: pulse
   # init_with_n_half_cycles: 12 
    
    
#-------------------------------------------
# LIGHT
#-------------------------------------------
light:
  - platform: monochromatic
    output: dimmer
    name: "vacuum cleaner"
    id: vacuum_cleaner
    restore_mode: ALWAYS_OFF
    icon: mdi:vacuum-outline
    gamma_correct: 0                    # Отключаем гамму (важно для двигателя)
    default_transition_length: 0s       # Без плавных переходов от HA
    on_turn_on: 
      then:
        - light.turn_on:
            id: vacuum_cleaner
            brightness: 0.10
        - delay: 0.2s
        - while:
            condition:
              lambda: return id(vacuum_cleaner)->current_values.get_brightness() < 1.0f;
            then:
              - light.dim_relative:
                  id: vacuum_cleaner
                  relative_brightness: 5%
              - delay: 0.1s
#-------------------------------------------
# STATUS LED
#-------------------------------------------
status_led:
  pin: 6
  
script:
  - id: motor_soft_start
    mode: single
    then:
      - light.turn_on:
          id: vacuum_cleaner
          brightness: 0.10
      - delay: 0.2s
      - while:
          condition:
            lambda: return id(vacuum_cleaner)->current_values.get_brightness() < 1.0f;
          then:
            - light.dim_relative:
                id: vacuum_cleaner
                relative_brightness: 5%
            - delay: 0.1s

#-------------------------------------------
# BINARY SENSOR
#-------------------------------------------
binary_sensor:
  - platform: gpio
    pin: 
      number: 2
      inverted: yes
    name: "vacum on"
    device_class: power
    on_press: 
      - light.toggle: vacuum_cleaner

  - platform: gpio
    pin: 
      number: 3
      inverted: yes
    name: "vacum start"
    device_class: window
    on_press: 
      - light.turn_on: vacuum_cleaner
    on_release:
      - light.turn_off: vacuum_cleaner

  - platform: gpio
    pin: 
      number: 5
      inverted: yes
    name: "overload"
    device_class: problem
    filters:
      - delayed_on: 500ms
    on_press: 
       - light.turn_off: vacuum_cleaner

#-------------------------------------------
# SENSOR
#-------------------------------------------
sensor:
  - platform: template
    name: "Mains Frequency"
    device_class: frequency
    state_class: measurement
    unit_of_measurement: Hz
    accuracy_decimals: 2
    entity_category: diagnostic
    update_interval: 10s
    lambda: return id(dimmer).get_frequency_hz();